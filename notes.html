<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Les Artistes — Notes & Idées</title>
<link rel="icon" type="image/png" href="logo-artistes.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --coral:#FF6B6B;--yellow:#FFD93D;--teal:#4ECDC4;--violet:#C77DFF;
  --pink:#FF9EBC;--lime:#A8E063;--deep:#1A1025;
  --surface:rgba(255,255,255,.06);--surface2:rgba(255,255,255,.10);
  --surface3:rgba(255,255,255,.16);--border:rgba(255,255,255,.12);
  --text:#fff;--muted:rgba(255,255,255,.5);--trans:all .3s cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--deep);color:var(--text);min-height:100vh;overflow-x:hidden;}

.bg{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 50% at 20% 0%,rgba(78,205,196,.22) 0%,transparent 55%),
    radial-gradient(ellipse 55% 60% at 80% 80%,rgba(199,125,255,.2) 0%,transparent 55%),
    radial-gradient(ellipse 70% 40% at 50% 40%,rgba(255,107,107,.1) 0%,transparent 50%),
    #1A1025;
  animation:bgP 18s ease-in-out infinite alternate;}
@keyframes bgP{0%{filter:hue-rotate(0deg)}100%{filter:hue-rotate(25deg)brightness(1.05)}}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;height:64px;background:rgba(26,16,37,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;gap:12px;}
.nav-logo{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:900;background:linear-gradient(135deg,var(--yellow),var(--coral),var(--violet));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap;text-decoration:none;display:flex;align-items:center;}
.nav-links{display:flex;gap:2px;align-items:center;}
.nav-link{padding:7px 12px;border-radius:10px;color:var(--muted);font-size:.8rem;font-weight:600;text-decoration:none;transition:var(--trans);white-space:nowrap;}
.nav-link:hover{color:var(--text);background:var(--surface2);}
.nav-link.active{color:var(--text);background:var(--surface2);}
.nav-link.active span{background:linear-gradient(135deg,var(--teal),var(--violet));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.nav-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.nav-user{display:flex;align-items:center;gap:7px;padding:5px 10px;border-radius:10px;background:var(--surface);border:1px solid var(--border);font-size:.8rem;color:var(--muted);}
.avatar{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--teal),var(--violet));display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;color:#fff;}
.btn-logout{padding:6px 12px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:.78rem;cursor:pointer;transition:var(--trans);font-family:'DM Sans',sans-serif;}
.btn-logout:hover{background:rgba(255,107,107,.15);color:var(--coral);}

/* HAMBURGER */
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:8px;background:none;border:none;flex-shrink:0;}
.hamburger span{width:22px;height:2px;background:var(--muted);border-radius:2px;transition:var(--trans);display:block;}
.hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
.hamburger.open span:nth-child(2){opacity:0;}
.hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}
.mobile-menu{display:none;position:fixed;top:64px;left:0;right:0;z-index:99;background:rgba(26,16,37,.98);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);flex-direction:column;gap:2px;padding:12px;}
.mobile-menu.open{display:flex;}
.mobile-menu .nav-link{font-size:.9rem;padding:12px 16px;border-radius:12px;}

main{padding-top:64px;position:relative;z-index:1;}

/* HERO */
.hero{padding:40px 24px 32px;text-align:center;}
.hero-title{font-family:'Playfair Display',serif;font-size:clamp(2rem,5vw,3rem);font-weight:900;margin-bottom:8px;background:linear-gradient(135deg,var(--teal),var(--violet),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hero-sub{color:var(--muted);font-size:.95rem;}

/* FILTERS */
.filters{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;padding:0 24px 28px;max-width:780px;margin:0 auto;}
.filter-btn{padding:7px 16px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:600;color:var(--muted);transition:var(--trans);}
.filter-btn:hover{background:var(--surface2);color:var(--text);}
.filter-btn.active{color:var(--text);}
.filter-btn[data-cat="all"].active{border-color:rgba(255,255,255,.4);background:rgba(255,255,255,.1);color:var(--text);}
.filter-btn[data-cat="bug"].active{border-color:rgba(255,107,107,.5);background:rgba(255,107,107,.12);color:var(--coral);}
.filter-btn[data-cat="idee"].active{border-color:rgba(78,205,196,.5);background:rgba(78,205,196,.12);color:var(--teal);}
.filter-btn[data-cat="autre"].active{border-color:rgba(199,125,255,.5);background:rgba(199,125,255,.12);color:var(--violet);}

/* MAIN LAYOUT */
.page-wrap{max-width:780px;margin:0 auto;padding:0 24px 80px;}

/* COMPOSE BOX */
.compose{background:var(--surface);border:1.5px solid var(--border);border-radius:20px;padding:18px 20px;margin-bottom:28px;transition:var(--trans);}
.compose:focus-within{border-color:rgba(78,205,196,.4);background:var(--surface2);box-shadow:0 0 0 3px rgba(78,205,196,.08);}
.compose-top{display:flex;gap:12px;align-items:flex-start;margin-bottom:12px;}
.compose-av{width:36px;height:36px;min-width:36px;border-radius:50%;background:linear-gradient(135deg,var(--teal),var(--violet));display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:700;color:#fff;flex-shrink:0;}
.compose-textarea{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.9rem;resize:none;line-height:1.5;min-height:60px;}
.compose-textarea::placeholder{color:var(--muted);}
.compose-bottom{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.cat-pills{display:flex;gap:6px;flex-wrap:wrap;}
.cat-pill{padding:5px 13px;border-radius:20px;border:1.5px solid var(--border);background:transparent;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:600;color:var(--muted);transition:var(--trans);}
.cat-pill:hover{background:var(--surface2);}
.cat-pill.sel-bug{border-color:rgba(255,107,107,.5);background:rgba(255,107,107,.12);color:var(--coral);}
.cat-pill.sel-idee{border-color:rgba(78,205,196,.5);background:rgba(78,205,196,.12);color:var(--teal);}
.cat-pill.sel-autre{border-color:rgba(199,125,255,.5);background:rgba(199,125,255,.12);color:var(--violet);}
.btn-post{padding:9px 22px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--teal),var(--violet));color:#fff;font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;transition:var(--trans);box-shadow:0 4px 16px rgba(78,205,196,.25);}
.btn-post:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(78,205,196,.4);}
.btn-post:disabled{opacity:.5;cursor:not-allowed;transform:none;}

/* NOTES LIST */
.notes-list{display:flex;flex-direction:column;gap:12px;}

/* NOTE CARD */
.note-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:16px 18px;transition:var(--trans);animation:noteIn .3s ease both;}
@keyframes noteIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.note-card:hover{border-color:rgba(255,255,255,.2);box-shadow:0 6px 24px rgba(0,0,0,.25);}

/* Cat badge */
.note-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px;}
.note-av{width:34px;height:34px;min-width:34px;border-radius:50%;background:linear-gradient(135deg,var(--coral),var(--violet));display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;color:#fff;flex-shrink:0;}
.note-meta{flex:1;min-width:0;}
.note-author{font-size:.85rem;font-weight:700;margin-bottom:2px;}
.note-time{font-size:.72rem;color:var(--muted);}
.note-cat-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:.7rem;font-weight:700;margin-left:auto;flex-shrink:0;}
.badge-bug{background:rgba(255,107,107,.12);border:1px solid rgba(255,107,107,.3);color:var(--coral);}
.badge-idee{background:rgba(78,205,196,.12);border:1px solid rgba(78,205,196,.3);color:var(--teal);}
.badge-autre{background:rgba(199,125,255,.1);border:1px solid rgba(199,125,255,.25);color:var(--violet);}

.note-body{font-size:.88rem;line-height:1.6;color:rgba(255,255,255,.88);margin-bottom:14px;white-space:pre-wrap;word-break:break-word;}

/* REACTIONS */
.note-footer{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.react-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;border:1.5px solid var(--border);background:transparent;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.8rem;color:var(--muted);transition:var(--trans);}
.react-btn:hover{background:var(--surface2);color:var(--text);border-color:rgba(255,255,255,.2);}
.react-btn.reacted{border-color:rgba(78,205,196,.4);background:rgba(78,205,196,.1);color:var(--teal);}
.react-btn .react-count{font-size:.78rem;font-weight:700;}
.react-emoji{font-size:.85rem;line-height:1;}

/* Add reaction picker */
.add-react-wrap{position:relative;display:inline-flex;}
.add-react-btn{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:20px;border:1.5px solid var(--border);background:transparent;cursor:pointer;font-size:.9rem;color:var(--muted);transition:var(--trans);}
.add-react-btn:hover{background:var(--surface2);color:var(--text);}
.emoji-picker{position:absolute;bottom:calc(100% + 8px);left:0;background:#2a1f3d;border:1px solid var(--border);border-radius:14px;padding:8px;display:none;flex-wrap:wrap;gap:4px;width:180px;z-index:50;box-shadow:0 8px 32px rgba(0,0,0,.5);}
.emoji-picker.open{display:flex;animation:fadeUp .18s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.emoji-opt{width:30px;height:30px;border-radius:8px;border:none;background:transparent;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:background .15s;}
.emoji-opt:hover{background:var(--surface2);}

/* Delete btn */
.note-del-btn{margin-left:auto;background:none;border:none;cursor:pointer;color:var(--muted);font-size:.75rem;padding:4px 8px;border-radius:8px;transition:color .2s;font-family:'DM Sans',sans-serif;}
.note-del-btn:hover{color:var(--coral);}

/* Empty / Loading */
.empty-state{text-align:center;padding:50px 20px;color:var(--muted);}
.empty-state .ei{font-size:2.8rem;margin-bottom:12px;}
.loading-wrap{display:flex;justify-content:center;padding:50px;}
.loading-spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:sp .8s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#2a1f3d;border:1px solid var(--border);border-radius:14px;padding:10px 20px;font-size:.85rem;color:var(--text);z-index:300;transition:transform .3s ease,opacity .3s ease;opacity:0;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

@media(max-width:768px){
  nav{padding:0 14px;}
  .nav-links{display:none;}
  .nav-right{display:none;}
  .hamburger{display:flex;}
  .page-wrap{padding:0 14px 60px;}
  .filters{padding:0 14px 20px;}
  .hero{padding:28px 14px 20px;}
  .compose-bottom{flex-direction:column;align-items:flex-start;}
  .btn-post{width:100%;}
}
</style>
</head>
<body>
<div class="bg"></div>

<nav>
  <a href="events.html" class="nav-logo"><img src="logo-artistes.png" alt="" style="height:42px;width:auto;vertical-align:middle;margin-right:8px;"> Les Artistes</a>
  <div class="nav-links">
    <a href="events.html"   class="nav-link"> Événements</a>
    <a href="news.html"     class="nav-link"> Actualités</a>
    <a href="photos.html"   class="nav-link"> Photos</a>
    <a href="games.html"    class="nav-link"> Jeux</a>
    <a href="shop.html"     class="nav-link"> Boutique</a>
    <a href="annuaire.html" class="nav-link"> Annuaire</a>
    <a href="notes.html"    class="nav-link active"><span> Notes</span></a>
  </div>
  <div class="nav-right">
    <div class="nav-user">
      <div class="avatar" id="nav-avatar">?</div>
      <span id="nav-name">...</span>
    </div>
    <button class="btn-logout" onclick="handleLogout()">Déconnexion</button>
  </div>
  <button class="hamburger" id="hamburger" onclick="toggleMenu()" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</nav>

<div class="mobile-menu" id="mobile-menu">
  <a href="events.html"   class="nav-link"> Événements</a>
  <a href="news.html"     class="nav-link"> Actualités</a>
  <a href="photos.html"   class="nav-link"> Photos</a>
  <a href="games.html"    class="nav-link"> Jeux</a>
  <a href="shop.html"     class="nav-link"> Boutique</a>
  <a href="annuaire.html" class="nav-link"> Annuaire</a>
  <a href="notes.html"    class="nav-link active"> Notes</a>
</div>

<main>
  <section class="hero">
    <h1 class="hero-title">Notes & Idées</h1>
    <p class="hero-sub">Bugs, suggestions, idées en vrac — tout est bienvenu !</p>
  </section>

  <div class="filters">
    <button class="filter-btn active" data-cat="all" onclick="setFilter('all',this)">🗂 Tout</button>
    <button class="filter-btn" data-cat="bug"   onclick="setFilter('bug',this)">🐛 Bugs</button>
    <button class="filter-btn" data-cat="idee"  onclick="setFilter('idee',this)">💡 Idées</button>
    <button class="filter-btn" data-cat="autre" onclick="setFilter('autre',this)">💬 Autre</button>
  </div>

  <div class="page-wrap">

    <!-- COMPOSE -->
    <div class="compose">
      <div class="compose-top">
        <div class="compose-av" id="compose-av">?</div>
        <textarea class="compose-textarea" id="compose-text" placeholder="Écris ton idée, signale un bug, propose une amélioration…" rows="3" onkeydown="handleComposeKey(event)"></textarea>
      </div>
      <div class="compose-bottom">
        <div class="cat-pills">
          <button class="cat-pill" data-cat="bug"   onclick="selectCat(this,'bug')">🐛 Bug</button>
          <button class="cat-pill" data-cat="idee"  onclick="selectCat(this,'idee')">💡 Idée</button>
          <button class="cat-pill" data-cat="autre" onclick="selectCat(this,'autre')">💬 Autre</button>
        </div>
        <button class="btn-post" id="btn-post" onclick="postNote()">Publier ✦</button>
      </div>
    </div>

    <!-- NOTES -->
    <div class="notes-list" id="notes-list">
      <div class="loading-wrap"><div class="loading-spinner"></div></div>
    </div>

  </div>
</main>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var SUPABASE_URL  = 'https://ldchxxkmvepvbvhdokot.supabase.co';
var SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxkY2h4eGttdmVwdmJ2aGRva290Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0NDQwNTMsImV4cCI6MjA4OTAyMDA1M30.HJw5-GsHCildEQ28HAB30_YKdiZOdeRJIml5wgLvHos';
var sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

var EMOJIS = ['👍','❤️','😂','🔥','👀','💯','✅','😮'];

var currentUser = null;
var allNotes    = [];
var allReacts   = [];
var selectedCat = 'autre';
var activeFilter = 'all';

// ── INIT ──────────────────────────────────────────────────────────────────────
(async function init() {
  var s = await sb.auth.getSession();
  if (!s.data.session) { window.location.href = 'login.html'; return; }
  currentUser = s.data.session.user;

  var p = await sb.from('profiles').select('prenom,pseudo').eq('id', currentUser.id).maybeSingle();
  var meta = currentUser.user_metadata || {};
  var prenom = (p.data && p.data.prenom) || meta.prenom || meta.pseudo || currentUser.email || '?';
  document.getElementById('nav-name').textContent    = prenom;
  document.getElementById('nav-avatar').textContent  = prenom[0].toUpperCase();
  document.getElementById('compose-av').textContent  = prenom[0].toUpperCase();

  // Sélectionner "Autre" par défaut
  document.querySelector('.cat-pill[data-cat="autre"]').classList.add('sel-autre');

  loadNotes();
})();

// ── LOAD ──────────────────────────────────────────────────────────────────────
async function loadNotes() {
  document.getElementById('notes-list').innerHTML =
    '<div class="loading-wrap"><div class="loading-spinner"></div></div>';

  var nr = await sb.from('notes').select('*').order('created_at', { ascending: false });
  allNotes = nr.data || [];

  // Profils
  if (allNotes.length) {
    var uids = [];
    allNotes.forEach(function(n){ if(uids.indexOf(n.user_id)===-1) uids.push(n.user_id); });
    var pr = await sb.from('profiles').select('id,prenom,nom,pseudo').in('id', uids);
    var pm = {};
    (pr.data||[]).forEach(function(p){ pm[p.id]=p; });
    allNotes.forEach(function(n){ n.profile = pm[n.user_id]||null; });
  }

  // Réactions
  var rr = await sb.from('note_reactions').select('*');
  allReacts = rr.data || [];

  renderNotes();
}

// ── RENDER ─────────────────────────────────────────────────────────────────────
function renderNotes() {
  var list = activeFilter === 'all'
    ? allNotes
    : allNotes.filter(function(n){ return n.categorie === activeFilter; });

  var el = document.getElementById('notes-list');

  if (!list.length) {
    el.innerHTML = '<div class="empty-state"><div class="ei">'
      + (activeFilter==='all' ? '🗒️' : activeFilter==='bug' ? '🐛' : activeFilter==='idee' ? '💡' : '💬')
      + '</div><p>Aucune note ici.<br>Sois le premier à écrire !</p></div>';
    return;
  }

  el.innerHTML = list.map(function(n){ return buildNoteCard(n); }).join('');
}

function buildNoteCard(n) {
  var p = n.profile;
  var author = p ? (p.prenom || p.pseudo || '?') : '?';
  var initials = author[0].toUpperCase();
  var timeStr  = formatTime(n.created_at);
  var isMe     = n.user_id === currentUser.id;

  // Badge catégorie
  var cat = n.categorie || 'autre';
  var badgeCls = cat==='bug' ? 'badge-bug' : cat==='idee' ? 'badge-idee' : 'badge-autre';
  var badgeLabel = cat==='bug' ? '🐛 Bug' : cat==='idee' ? '💡 Idée' : '💬 Autre';
  var badgeHtml = '<span class="note-cat-badge '+badgeCls+'">'+badgeLabel+'</span>';

  // Réactions groupées
  var myReacts = allReacts.filter(function(r){ return r.note_id===n.id && r.user_id===currentUser.id; });
  var myEmojis = myReacts.map(function(r){ return r.emoji; });

  // Compter par emoji
  var counts = {};
  allReacts.filter(function(r){ return r.note_id===n.id; }).forEach(function(r){
    counts[r.emoji] = (counts[r.emoji]||0) + 1;
  });

  var reactBtns = Object.keys(counts).map(function(emoji) {
    var cnt  = counts[emoji];
    var mine = myEmojis.indexOf(emoji) !== -1;
    return '<button class="react-btn'+(mine?' reacted':'')+'" onclick="toggleReact(\''+esc(n.id)+'\',\''+emoji+'\')">'
      + '<span class="react-emoji">'+emoji+'</span>'
      + '<span class="react-count">'+cnt+'</span>'
      + '</button>';
  }).join('');

  // Add reaction
  var pickerId = 'picker-'+n.id.replace(/-/g,'');
  var emojiOpts = EMOJIS.map(function(e){
    return '<button class="emoji-opt" onclick="addReact(\''+esc(n.id)+'\',\''+e+'\');closePicker(\''+pickerId+'\')" title="'+e+'">'+e+'</button>';
  }).join('');

  var addReactHtml = '<div class="add-react-wrap">'
    + '<button class="add-react-btn" onclick="togglePicker(\''+pickerId+'\')">＋</button>'
    + '<div class="emoji-picker" id="'+pickerId+'">'+emojiOpts+'</div>'
    + '</div>';

  var delBtn = isMe
    ? '<button class="note-del-btn" onclick="deleteNote(\''+esc(n.id)+'\')">🗑 Supprimer</button>'
    : '';

  return '<div class="note-card" id="note-'+n.id.replace(/-/g,'')+'">'
    + '<div class="note-header">'
    +   '<div class="note-av">'+initials+'</div>'
    +   '<div class="note-meta"><div class="note-author">'+esc(author)+'</div><div class="note-time">'+timeStr+'</div></div>'
    +   badgeHtml
    + '</div>'
    + '<div class="note-body">'+esc(n.contenu)+'</div>'
    + '<div class="note-footer">'
    +   reactBtns
    +   addReactHtml
    +   delBtn
    + '</div>'
    + '</div>';
}

// ── POST ──────────────────────────────────────────────────────────────────────
async function postNote() {
  var txt = document.getElementById('compose-text').value.trim();
  if (!txt) { showToast('✏️ Écris quelque chose avant de publier !'); return; }

  var btn = document.getElementById('btn-post');
  btn.disabled = true; btn.textContent = '...';

  var r = await sb.from('notes').insert({
    user_id:   currentUser.id,
    contenu:   txt,
    categorie: selectedCat
  });

  btn.disabled = false; btn.textContent = 'Publier ✦';

  if (r.error) { showToast('❌ Erreur : '+r.error.message); return; }

  document.getElementById('compose-text').value = '';
  showToast('✅ Note publiée !');
  loadNotes();
}

function handleComposeKey(e) {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) postNote();
}

// ── CATÉGORIE ─────────────────────────────────────────────────────────────────
function selectCat(btn, cat) {
  document.querySelectorAll('.cat-pill').forEach(function(b){
    b.classList.remove('sel-bug','sel-idee','sel-autre');
  });
  btn.classList.add('sel-'+cat);
  selectedCat = cat;
}

// ── FILTRE ────────────────────────────────────────────────────────────────────
function setFilter(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  renderNotes();
}

// ── RÉACTIONS ─────────────────────────────────────────────────────────────────
async function toggleReact(noteId, emoji) {
  var existing = allReacts.find(function(r){
    return r.note_id===noteId && r.user_id===currentUser.id && r.emoji===emoji;
  });
  if (existing) {
    await sb.from('note_reactions').delete().eq('id', existing.id);
  } else {
    await sb.from('note_reactions').insert({ note_id: noteId, user_id: currentUser.id, emoji: emoji });
  }
  // Reload réactions seulement
  var rr = await sb.from('note_reactions').select('*');
  allReacts = rr.data || [];
  renderNotes();
}

async function addReact(noteId, emoji) {
  var existing = allReacts.find(function(r){
    return r.note_id===noteId && r.user_id===currentUser.id && r.emoji===emoji;
  });
  if (!existing) {
    await sb.from('note_reactions').insert({ note_id: noteId, user_id: currentUser.id, emoji: emoji });
    var rr = await sb.from('note_reactions').select('*');
    allReacts = rr.data || [];
    renderNotes();
  }
}

// ── DELETE ────────────────────────────────────────────────────────────────────
async function deleteNote(noteId) {
  if (!confirm('Supprimer cette note ?')) return;
  await sb.from('note_reactions').delete().eq('note_id', noteId);
  await sb.from('notes').delete().eq('id', noteId);
  showToast('🗑 Note supprimée');
  loadNotes();
}

// ── EMOJI PICKER ──────────────────────────────────────────────────────────────
function togglePicker(pickerId) {
  var el = document.getElementById(pickerId);
  if (!el) return;
  var wasOpen = el.classList.contains('open');
  // Fermer tous
  document.querySelectorAll('.emoji-picker.open').forEach(function(p){ p.classList.remove('open'); });
  if (!wasOpen) el.classList.add('open');
}

function closePicker(pickerId) {
  var el = document.getElementById(pickerId);
  if (el) el.classList.remove('open');
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('.add-react-wrap')) {
    document.querySelectorAll('.emoji-picker.open').forEach(function(p){ p.classList.remove('open'); });
  }
  // Fermer menu mobile
  var menu = document.getElementById('mobile-menu');
  var hamb = document.getElementById('hamburger');
  if (menu && menu.classList.contains('open') && !menu.contains(e.target) && hamb && !hamb.contains(e.target)) {
    menu.classList.remove('open'); hamb.classList.remove('open');
  }
});

// ── UTILS ─────────────────────────────────────────────────────────────────────
function formatTime(iso) {
  var d    = new Date(iso);
  var now  = new Date();
  var diff = Math.floor((now - d) / 1000);
  if (diff < 60)   return 'À l\'instant';
  if (diff < 3600) return 'Il y a ' + Math.floor(diff/60) + ' min';
  if (diff < 86400)return 'Il y a ' + Math.floor(diff/3600) + 'h';
  var days = Math.floor(diff/86400);
  if (days < 7)    return 'Il y a ' + days + ' j';
  return d.toLocaleDateString('fr-FR', { day:'numeric', month:'short', year:'numeric' });
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2800);
}

function toggleMenu() {
  var menu = document.getElementById('mobile-menu');
  var hamb = document.getElementById('hamburger');
  var isOpen = menu.classList.toggle('open');
  hamb.classList.toggle('open', isOpen);
}

async function handleLogout() { await sb.auth.signOut(); window.location.href = 'login.html'; }
</script>
